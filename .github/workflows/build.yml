name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Read the pinned Maestral version straight from the Dockerfile ARG
      # so there's one source of truth.
      - name: Extract Maestral version
        id: maestral
        run: |
          version=$(grep -m1 'ARG MAESTRAL_VERSION=' Dockerfile | cut -d= -f2)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags:
      #   push to main  → ghcr.io/…:main  +  ghcr.io/…:latest
      #   tag v1.9.5    → ghcr.io/…:1.9.5 + ghcr.io/…:1.9 + ghcr.io/…:latest
      #   pull request  → build only, no push
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MAESTRAL_VERSION=${{ steps.maestral.outputs.version }}
          # Layer cache shared across branches via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
